name: Hourly Reports

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  reports:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram Hourly Report
        run: curl -sf https://blaxcrm.org/.netlify/functions/telegram-report
      - name: Discord Fan Tracker
        run: curl -sf https://blaxcrm.org/.netlify/functions/discord-notify
